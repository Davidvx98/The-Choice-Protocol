<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="20" fill="none" stroke="#b026ff" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Pill emoji -->
  <text x="600" y="200" text-anchor="middle" font-size="80" fill="white">💊</text>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="52" font-weight="bold" fill="white">Las Píldoras</text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#a0a0a0">Recomendador de Anime y Películas con IA</text>
  <!-- Pills -->
  <circle cx="520" cy="460" r="25" fill="#ff2d55" opacity="0.8"/>
  <text x="520" y="467" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="white">ANIME</text>
  <circle cx="680" cy="460" r="25" fill="#00d4ff" opacity="0.8"/>
  <text x="680" y="467" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="white">CINE</text>
  <!-- Tagline -->
  <text x="600" y="540" text-anchor="middle" font-family="monospace" font-size="16" fill="#b026ff" opacity="0.7">¿Qué deberías ver hoy?</text>
</svg>
